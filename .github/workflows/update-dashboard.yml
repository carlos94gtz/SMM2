name: Update SMM2 dashboard

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Fecha local a publicar, formato YYYY-MM-DD. Vacío = ayer en CDMX."
        required: false
        type: string
  schedule:
    - cron: "15 7 * * *"
    - cron: "30 10 * * *"

permissions:
  contents: write

concurrency:
  group: update-smm2-dashboard
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve target date
        id: target
        env:
          REQUESTED_DATE: ${{ github.event.inputs.date || '' }}
          RUN_EVENT: ${{ github.event_name }}
        run: |
          if [ -n "$REQUESTED_DATE" ]; then
            TARGET_DATE="$REQUESTED_DATE"
          else
            TARGET_DATE="$(TZ=America/Mexico_City date -d 'yesterday' +'%Y-%m-%d')"
          fi

          FORCE_UPDATE="false"
          if [ "$RUN_EVENT" = "workflow_dispatch" ]; then
            FORCE_UPDATE="true"
          fi

          echo "date=$TARGET_DATE" >> "$GITHUB_OUTPUT"
          echo "force=$FORCE_UPDATE" >> "$GITHUB_OUTPUT"
          echo "Target SMM2 date: $TARGET_DATE"
          echo "Force update: $FORCE_UPDATE"

      - name: Check current dashboard date
        id: current
        run: |
          CURRENT_DATE="$(python -c 'import json, pathlib; text = pathlib.Path("data.js").read_text(encoding="utf-8"); payload = json.loads(text.split("=", 1)[1].rsplit(";", 1)[0]); print(payload.get("date", ""))')"
          echo "date=$CURRENT_DATE" >> "$GITHUB_OUTPUT"
          echo "Current SMM2 date: $CURRENT_DATE"

      - name: Update dashboard data
        if: steps.target.outputs.force == 'true' || steps.current.outputs.date != steps.target.outputs.date
        env:
          TARGET_DATE: ${{ steps.target.outputs.date }}
          SMM2_PLAYER_ID: ${{ vars.SMM2_PLAYER_ID || secrets.SMM2_PLAYER_ID || 'S00DC0DDG' }}
        run: |
          THUMBNAIL_ARGS=(--thumbnail-timeout 10 --thumbnail-retries 1 --thumbnail-delay 0.05 --thumbnail-workers 4)
          python scripts/update_dashboard.py --date "$TARGET_DATE" "${THUMBNAIL_ARGS[@]}"
          python scripts/update_roblox_dashboard.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js index.html thumbs automation-state.json roblox/data.js
          if git diff --cached --quiet; then
            echo "No dashboard changes to publish."
          else
            DASHBOARD_DATE="$(python -c 'import json, pathlib; text = pathlib.Path("data.js").read_text(encoding="utf-8"); payload = json.loads(text.split("=", 1)[1].rsplit(";", 1)[0]); print(payload["date"])')"
            git commit -m "Update SMM2 dashboard for ${DASHBOARD_DATE}"
            git push
          fi
