<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SMM2 Rankings de Ayer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="kicker">Super Mario Maker 2</p>
        <h1>Rankings de niveles publicados ayer</h1>
      </div>
      <div class="meta">
        <span id="dateLabel">--</span>
      </div>
    </header>

    <main>
      <section class="leaderboards">
        <section class="board" aria-labelledby="likesTitle">
          <div class="board-heading">
            <div>
              <p class="kicker">Top 10</p>
              <h2 id="likesTitle">Más likes</h2>
            </div>
            <span class="sort-label">likes ↓</span>
          </div>
          <div id="topLiked" class="level-list"></div>
        </section>

        <section class="board" aria-labelledby="clearedTitle">
          <div class="board-heading">
            <div>
              <p class="kicker">Top 10</p>
              <h2 id="clearedTitle">Menos superados</h2>
            </div>
            <span class="sort-label">clear rate ↑</span>
          </div>
          <div id="leastCleared" class="level-list"></div>
        </section>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
